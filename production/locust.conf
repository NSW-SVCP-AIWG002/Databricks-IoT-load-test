# -------------------------------------------------------
# Locust 設定ファイル
#
# Docker Compose 使用時はこのファイルより docker-compose.yml の
# command セクションが優先される。
# ローカル単体起動時（docker なし）の既定値として機能する。
#
# ローカル単体起動例:
#   cd production/
#   EVENTHUB_CONNECTION_STRING=... locust -f locustfile.py \
#     --headless -u 2 -r 1 --run-time 2m
# -------------------------------------------------------

# Web UI
web-host = 0.0.0.0
web-port = 8089

# ログファイル出力
logfile = ./output/locust.log

# 統計 CSV 出力（csv-full-history はマスターのみ有効にするため docker-compose で指定）
csv = output/locust_statistics
