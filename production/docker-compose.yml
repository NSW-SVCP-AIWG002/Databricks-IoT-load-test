version: "3.9"

# -------------------------------------------------------
# Locust 分散負荷テスト構成（20,000台構成）
#
# 構成:
#   master     : Web UI / ワーカー統括
#   worker-1   : device_id     1〜 5000
#   worker-2   : device_id  5001〜10000
#   worker-3   : device_id 10001〜15000
#   worker-4   : device_id 15001〜20000
#   合計       : IoT 20,000台（5000台 × 4 worker）
#
# VM 構成:
#   locust-master (10.10.1.4) : master のみ起動
#   locust-worker-1 (10.10.1.5) : worker-1 のみ起動
#   locust-worker-2 (10.10.1.6) : worker-2 のみ起動
#   locust-worker-3 (10.10.1.7) : worker-3 のみ起動
#   locust-worker-4 (10.10.1.8) : worker-4 のみ起動
#
# 事前準備:
#   device.create.txt の [A][B] を順に実行して
#   device_master に 20,000台分を登録すること
#
#   silver_pipeline.py（Databricks）が起動済みであること。
#   Event Hub 経由で Delta Lake（ADLS）への書き込みを確認する。
#
# 起動:
#   Master VM : docker-compose up --build -d master
#   Worker VM1: docker-compose up --build -d worker-1
#   Worker VM2: docker-compose up --build -d worker-2
#   Worker VM3: docker-compose up --build -d worker-3
#   Worker VM4: docker-compose up --build -d worker-4
#   → ブラウザで http://localhost:8089 を開き
#     Users=20001, Spawn rate=200 でテスト開始
#     (MqttDeviceUser×20000 + EventHubConsumerUser×1)
#
# 停止:
#   docker-compose down
#
# 統計 CSV 出力先: ./output/locust_statistics*.csv
# 環境変数は .env ファイルで設定してください
# -------------------------------------------------------

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  image: iotbricks-locust:latest
  env_file:
    - .env
  environment:
    DEVICE_COUNT: 5000
  command:
    - --worker
    - --master-host=${MASTER_HOST:-master}
    - -f
    - locustfile.py
  networks:
    - locust-net
  volumes:
    - ./device_credentials.csv:/loadtest/device_credentials.csv:ro
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
    image: iotbricks-locust:latest
    container_name: locust-master
    ports:
      - "8089:8089"   # Locust Web UI
      - "5557:5557"   # Worker communication
    env_file:
      - .env
    command:
      - --master
      - --host=${TARGET_HOST:-http://localhost}
      - --web-host=0.0.0.0
      - -f
      - locustfile.py
      - --csv=output/locust_statistics
      - --logfile=output/locust.log
    volumes:
      - ./device_credentials.csv:/loadtest/device_credentials.csv:ro
      - ./output:/loadtest/output
    networks:
      - locust-net

  worker-1:
    <<: *worker-base
    container_name: locust-worker-1
    environment:
      DEVICE_COUNT: 5000
      DEVICE_ID_OFFSET: 1

  worker-2:
    <<: *worker-base
    container_name: locust-worker-2
    environment:
      DEVICE_COUNT: 5000
      DEVICE_ID_OFFSET: 5001

  worker-3:
    <<: *worker-base
    container_name: locust-worker-3
    environment:
      DEVICE_COUNT: 5000
      DEVICE_ID_OFFSET: 10001

  worker-4:
    <<: *worker-base
    container_name: locust-worker-4
    environment:
      DEVICE_COUNT: 5000
      DEVICE_ID_OFFSET: 15001

networks:
  locust-net:
    driver: bridge
