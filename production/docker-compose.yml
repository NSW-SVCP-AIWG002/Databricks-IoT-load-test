version: "3.9"

# -------------------------------------------------------
# Locust 分散負荷テスト構成（20,800台構成）
#
# 構成:
#   master      : Web UI / ワーカー統括（CPU 8コア）
#   worker-1a/b : device_id     1〜 1300 /  1301〜 2600
#   worker-2a/b : device_id  2601〜 3900 /  3901〜 5200
#   worker-3a/b : device_id  5201〜 6500 /  6501〜 7800
#   worker-4a/b : device_id  7801〜 9100 /  9101〜10400
#   worker-5a/b : device_id 10401〜11700 / 11701〜13000
#   worker-6a/b : device_id 13001〜14300 / 14301〜15600
#   worker-7a/b : device_id 15601〜16900 / 16901〜18200
#   worker-8a/b : device_id 18201〜19500 / 19501〜20800
#   合計        : IoT 20,800台（1300台 × 16 worker）
#
# VM 構成:
#   locust-master    (10.10.1.4)  : master のみ起動（8 CPU）
#   locust-worker-1  (10.10.1.5)  : worker-1a, worker-1b を起動
#   locust-worker-2  (10.10.1.6)  : worker-2a, worker-2b を起動
#   locust-worker-3  (10.10.1.7)  : worker-3a, worker-3b を起動
#   locust-worker-4  (10.10.1.8)  : worker-4a, worker-4b を起動
#   locust-worker-5  (10.10.1.9)  : worker-5a, worker-5b を起動
#   locust-worker-6  (10.10.1.10) : worker-6a, worker-6b を起動
#   locust-worker-7  (10.10.1.11) : worker-7a, worker-7b を起動
#   locust-worker-8  (10.10.1.12) : worker-8a, worker-8b を起動
#
# 理由:
#   接続断を考慮して各ワーカーに余裕を持たせ、20,800台で検証する。
#   Python GIL により 1プロセス = 1コアしか使えない。
#   1VMに2コンテナ起動することで2プロセス = 2コア利用可能になる。
#
# 起動:
#   Master VM    : docker-compose up --build -d master
#   Worker VM1   : docker-compose up --build -d worker-1a worker-1b
#   Worker VM2   : docker-compose up --build -d worker-2a worker-2b
#   Worker VM3   : docker-compose up --build -d worker-3a worker-3b
#   Worker VM4   : docker-compose up --build -d worker-4a worker-4b
#   Worker VM5   : docker-compose up --build -d worker-5a worker-5b
#   Worker VM6   : docker-compose up --build -d worker-6a worker-6b
#   Worker VM7   : docker-compose up --build -d worker-7a worker-7b
#   Worker VM8   : docker-compose up --build -d worker-8a worker-8b
#   → ブラウザで http://localhost:8089 を開き
#     Users=20801, Spawn rate=20 でテスト開始
#     (MqttDeviceUser×20800 + EventHubConsumerUser×1)
#
# 停止:
#   docker-compose down
#
# 統計 CSV 出力先: ./output/locust_statistics*.csv
# 環境変数は .env ファイルで設定してください
# -------------------------------------------------------

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  image: iotbricks-locust:latest
  env_file:
    - .env
  environment:
    DEVICE_COUNT: 1300
  command:
    - --worker
    - --master-host=${MASTER_HOST:-master}
    - -f
    - locustfile.py
  networks:
    - locust-net
  volumes:
    - ./device_credentials.csv:/loadtest/device_credentials.csv:ro
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
    image: iotbricks-locust:latest
    container_name: locust-master
    ports:
      - "8089:8089"   # Locust Web UI
      - "5557:5557"   # Worker communication
    env_file:
      - .env
    command:
      - --master
      - --host=${TARGET_HOST:-http://localhost}
      - --web-host=0.0.0.0
      - -f
      - locustfile.py
      - --csv=output/locust_statistics
      - --logfile=output/locust.log
      - --expect-workers=16
      - --heartbeat-liveness=10
    volumes:
      - ./device_credentials.csv:/loadtest/device_credentials.csv:ro
      - ./output:/loadtest/output
    networks:
      - locust-net

  worker-1a:
    <<: *worker-base
    container_name: locust-worker-1a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 1

  worker-1b:
    <<: *worker-base
    container_name: locust-worker-1b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 1301

  worker-2a:
    <<: *worker-base
    container_name: locust-worker-2a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 2601

  worker-2b:
    <<: *worker-base
    container_name: locust-worker-2b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 3901

  worker-3a:
    <<: *worker-base
    container_name: locust-worker-3a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 5201

  worker-3b:
    <<: *worker-base
    container_name: locust-worker-3b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 6501

  worker-4a:
    <<: *worker-base
    container_name: locust-worker-4a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 7801

  worker-4b:
    <<: *worker-base
    container_name: locust-worker-4b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 9101

  worker-5a:
    <<: *worker-base
    container_name: locust-worker-5a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 10401

  worker-5b:
    <<: *worker-base
    container_name: locust-worker-5b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 11701

  worker-6a:
    <<: *worker-base
    container_name: locust-worker-6a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 13001

  worker-6b:
    <<: *worker-base
    container_name: locust-worker-6b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 14301

  worker-7a:
    <<: *worker-base
    container_name: locust-worker-7a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 15601

  worker-7b:
    <<: *worker-base
    container_name: locust-worker-7b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 16901

  worker-8a:
    <<: *worker-base
    container_name: locust-worker-8a
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 18201

  worker-8b:
    <<: *worker-base
    container_name: locust-worker-8b
    environment:
      DEVICE_COUNT: 1300
      DEVICE_ID_OFFSET: 19501

networks:
  locust-net:
    driver: bridge
